permalink: /
---
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=/en/">
  <script>
    (function () {
      var supported = {{ site.languages | jsonify }};
      var fallback = {{ site.default_lang | jsonify }};
      var languages = navigator.languages && navigator.languages.length
        ? navigator.languages
        : [navigator.language || navigator.userLanguage || fallback];

      var selected = fallback;
      for (var i = 0; i < languages.length; i += 1) {
        var candidate = String(languages[i] || '').toLowerCase().split('-')[0];
        if (supported.indexOf(candidate) !== -1) {
          selected = candidate;
          break;
        }
      }

      window.location.replace('/' + selected + '/');
    })();
  </script>
</head>
<body>
  <noscript>
    <p>JavaScript is disabled. Continue to <a href="/en/">English</a>.</p>
  </noscript>
</body>
</html>
